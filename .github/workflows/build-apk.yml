name: Build Paisa APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Create android/local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME"         > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT"     >> android/local.properties
          echo "flutter.versionName=1.0.0"     >> android/local.properties
          echo "flutter.versionCode=1"         >> android/local.properties

      - name: Generate app icons (blue square placeholder)
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}
          done
          convert -size 48x48   xc:"#2563EB" android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 72x72   xc:"#2563EB" android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 96x96   xc:"#2563EB" android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 144x144 xc:"#2563EB" android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 192x192 xc:"#2563EB" android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: paisa-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
